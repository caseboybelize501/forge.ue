version: '3.8'

services:
  forge-server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - UNREAL_ENGINE_ROOT=/ue5
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/forge
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
    volumes:
      - ./output:/app/output
      - ./logs:/app/logs
    depends_on:
      - postgres
      - redis
    command: uvicorn server.main:app --host 0.0.0.0 --port 8000

  forge-worker:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - UNREAL_ENGINE_ROOT=/ue5
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/forge
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
    volumes:
      - ./output:/app/output
      - ./logs:/app/logs
    depends_on:
      - postgres
      - redis
    command: celery -A server.workers.celery_app worker --loglevel=info

  postgres:
    image: postgres:15
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=forge
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - forge-server

volumes:
  postgres_data:
  redis_data:
